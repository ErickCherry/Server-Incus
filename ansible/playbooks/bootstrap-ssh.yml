---
# Prepara SSH en contenedores para que Ansible use inventory por IP (10.10.0.x)
- name: Bootstrap SSH vía Incus
  hosts: localhost
  gather_facts: false
  become: false
  tasks:
    - name: Clave pública del operador
      ansible.builtin.stat:
        path: "{{ lookup('env', 'HOME') }}/.ssh/id_ed25519.pub"
      register: key_ed25519

    - name: Clave pública alternativa (rsa)
      ansible.builtin.stat:
        path: "{{ lookup('env', 'HOME') }}/.ssh/id_rsa.pub"
      register: key_rsa
      when: not key_ed25519.stat.exists

    - name: Definir pubkey
      ansible.builtin.set_fact:
        ssh_pub_key: "{{ lookup('file', lookup('env', 'HOME') + '/.ssh/id_ed25519.pub') if key_ed25519.stat.exists else lookup('file', lookup('env', 'HOME') + '/.ssh/id_rsa.pub') }}"

    - name: Instalar OpenSSH en contenedores
      ansible.builtin.command: >-
        incus exec {{ item }} --
        bash -c 'DEBIAN_FRONTEND=noninteractive apt-get update -qq &&
        apt-get install -y -qq openssh-server python3 sudo &&
        systemctl enable --now ssh'
      loop: "{{ groups['all'] }}"
      changed_when: true

    - name: Autorizar clave SSH en root
      ansible.builtin.shell: |
        incus exec {{ item }} -- bash -c 'mkdir -p /root/.ssh && chmod 700 /root/.ssh'
        echo '{{ ssh_pub_key }}' | incus exec {{ item }} -- tee /root/.ssh/authorized_keys
        incus exec {{ item }} -- chmod 600 /root/.ssh/authorized_keys
      loop: "{{ groups['all'] }}"
      changed_when: true
